name: Weekly Pulse Pipeline

on:
  schedule:
    # 9:00 AM IST is 3:30 AM UTC
    - cron: '30 3 * * 1'
  workflow_dispatch:
    # Allow manual triggering from the GitHub Actions UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Cache pip dependencies to speed up runs

    - name: Install dependencies
      working-directory: ./weekly_pulse
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Weekly Pulse
      working-directory: ./weekly_pulse
      env:
        # These secrets must be added to the GitHub repository's Secrets configuration
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        MCP_BASE_URL: ${{ secrets.MCP_BASE_URL }}
        MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
        TARGET_DOC_ID: ${{ secrets.TARGET_DOC_ID }}
        STAKEHOLDER_EMAIL: ${{ secrets.STAKEHOLDER_EMAIL }}
      run: |
        python src/main.py --weeks 1
